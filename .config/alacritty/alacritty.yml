window:
  dimensions:
    columns: 140
    lines: 50

  padding:
    x: 0
    y: 0

  decorations: transparent

  opacity: 0.97

  startup_mode: Maximized # Windowed / Maximized / Fullscreen / SimpleFullscreen

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: FiraCode Nerd Font
    style: Regular

  bold:
    family: FiraCode Nerd Font 
    style: Bold

  italic:
    family: FiraCode Nerd Font 
    style: Italic

  bold_italic:
    family: FiraCode Nerd Font 
    style: Bold Italic

  size: 20.0

  offset:
    x: 0
    y: 0

  glyph_offset:
    x: 0
    y: 0

  use_thin_strokes: false

draw_bold_text_with_bright_colors: true

cursor:
  style:
    shape: Block
    blinking: Off

  unfocused_hollow: true

  thickness: 0.15

live_config_reload: true

# Colors (Gruvbox Material Dark Medium)
colors:
  primary:
    background: '0x282828'
    foreground: '0xdfbf8e'

  normal:
    black:   '0x665c54'
    red:     '0xea6962'
    green:   '0xa9b665'
    yellow:  '0xe78a4e'
    blue:    '0x7daea3'
    magenta: '0xd3869b'
    cyan:    '0x89b482'
    white:   '0xdfbf8e'

  bright:
    black:   '0x928374'
    red:     '0xea6962'
    green:   '0xa9b665'
    yellow:  '0xe3a84e'
    blue:    '0x7daea3'
    magenta: '0xd3869b'
    cyan:    '0x89b482'
    white:   '0xdfbf8e'
